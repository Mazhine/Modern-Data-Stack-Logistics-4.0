events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Control Tower Main App (Port 8000 mapped to 80 internal)
    server {
        listen 80;
        resolver 127.0.0.11 valid=5s;

        location /adminer/ {
            set $adminer "adminer:8080";
            rewrite ^/adminer/(.*) /$1 break;
            proxy_pass http://$adminer;
            proxy_set_header Host $host;
            proxy_hide_header X-Frame-Options;
            proxy_hide_header Content-Security-Policy;
            proxy_redirect ~^(https?://[^/]+)?/(.*) /adminer/$2;
        }

        location /api/ {
            set $backend "control-tower:8000";
            rewrite ^/api/(.*) /$1 break;
            proxy_pass http://$backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location / {
            set $backend "control-tower:8000";
            proxy_pass http://$backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }

    # Airflow Proxy
    server {
        listen 18080;
        location / {
            proxy_pass http://airflow:8080/;
            proxy_hide_header X-Frame-Options;
            proxy_hide_header Content-Security-Policy;
        }
    }

    # Kafka UI Proxy
    server {
        listen 18083;
        location / {
            proxy_pass http://kafka-ui:8080/;
            proxy_hide_header X-Frame-Options;
        }
    }

    # Spark Master Proxy
    server {
        listen 18082;
        location / {
            proxy_pass http://spark-master:8080/;
            proxy_hide_header X-Frame-Options;
        }
    }

    # Grafana Proxy
    server {
        listen 13000;
        location / {
            proxy_pass http://grafana:3000/;
            proxy_set_header Host $http_host;
            proxy_hide_header X-Frame-Options;
            proxy_hide_header Content-Security-Policy;
        }
    }

    # MLflow Proxy
    server {
        listen 15000;
        location / {
            proxy_pass http://mlflow:5000/;
            proxy_hide_header X-Frame-Options;
        }
    }

    # MinIO Console Proxy
    server {
        listen 19001;
        location / {
            proxy_pass http://minio:9001/;
            proxy_hide_header X-Frame-Options;
            proxy_hide_header Content-Security-Policy;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }

    # Adminer Proxy (Postgres)
    server {
        listen 18081;
        location / {
            proxy_pass http://adminer:8080/;
            proxy_hide_header X-Frame-Options;
        }
    }
}
