# ==============================================================================
# PIPELINE BIG DATA - LOGISTICS 4.0 (ARCHITECTURE INDUSTRIELLE COMPLETE)
# ==============================================================================

services:
  # ----------------------------------------------------------------------------
  # 1. ZOOKEEPER & KAFKA (Couche Ingestion Streaming)
  # ----------------------------------------------------------------------------
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: 01_zookeeper
    mem_limit: 256m
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - logistics_net

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: 02_kafka
    mem_limit: 1024m
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - logistics_net

  # ----------------------------------------------------------------------------
  # 2. APACHE SPARK (Couche Traitement & MLlib)
  # ----------------------------------------------------------------------------
  spark-master:
    image: bitnamilegacy/spark:3.5
    container_name: 03_spark_master
    mem_limit: 512m
    environment:
      - SPARK_MODE=master
      - SPARK_RPC_AUTHENTICATION_ENABLED=no
      - SPARK_RPC_ENCRYPTION_ENABLED=no
      - SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED=no
      - SPARK_SSL_ENABLED=no
    ports:
      - "8082:8080" # Dcal pour Airflow (8080)
      - "7077:7077"
    volumes:
      - ./spark_processor.py:/opt/bitnami/spark/jobs/spark_processor.py
      - ./spark_jars:/opt/bitnami/spark/jars_custom
    networks:
      - logistics_net

  spark-worker:
    image: bitnamilegacy/spark:3.5
    container_name: 04_spark_worker
    mem_limit: 1g
    depends_on:
      - spark-master
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_MEMORY=1G # bridag CPU/RAM pour survie du PC
      - SPARK_WORKER_CORES=1
    volumes:
      - ./spark_processor.py:/opt/bitnami/spark/jobs/spark_processor.py
      - ./spark_jars:/opt/bitnami/spark/jars_custom
    networks:
      - logistics_net

  # ----------------------------------------------------------------------------
  # 3. BASE DE DONNÉES (Couches Silver & Gold)
  # ----------------------------------------------------------------------------
  postgres:
    image: postgres:15-alpine
    container_name: 05_postgres
    mem_limit: 512m
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=admin_logistics
      - POSTGRES_PASSWORD=securepassword123
      - POSTGRES_DB=logistics_db
    volumes:
      - ./postgres-init:/docker-entrypoint-initdb.d
      - pgdata_logistics:/var/lib/postgresql/data
    networks:
      - logistics_net

  adminer:
    image: adminer
    container_name: 06_adminer
    mem_limit: 128m
    ports:
      - "8081:8080"
    environment:
      - ADMINER_DEFAULT_SERVER=postgres
    networks:
      - logistics_net

  # ----------------------------------------------------------------------------
  # 4. MINIO (Couche Bronze / Data Lake)
  # ----------------------------------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: 07_minio
    mem_limit: 512m
    environment:
      - MINIO_ROOT_USER=admin
      - MINIO_ROOT_PASSWORD=password
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - logistics_net

  minio-init:
    image: minio/mc:latest
    container_name: 08_minio_init
    mem_limit: 128m
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      echo 'Init MinIO...'; sleep 5;
      /usr/bin/mc config host add myminio http://minio:9000 admin password;
      /usr/bin/mc mb myminio/logistics-bronze || true;
      /usr/bin/mc policy set public myminio/logistics-bronze; exit 0;
      "
    networks:
      - logistics_net

  # ----------------------------------------------------------------------------
  # 5. ORCHESTRATION (Apache Airflow Standalone Ultra-Lite)
  # ----------------------------------------------------------------------------
  airflow:
    image: apache/airflow:2.8.2
    container_name: 09_airflow_standalone
    mem_limit: 1536m
    environment:
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - _AIRFLOW_DB_UPGRADE=True
      - _AIRFLOW_WWW_USER_CREATE=True
      - _AIRFLOW_WWW_USER_USERNAME=admin
      - _AIRFLOW_WWW_USER_PASSWORD=admin
    ports:
      - "8080:8080"
    volumes:
      - ./dags:/opt/airflow/dags
      - ./:/opt/logistics # Exposition de dbt au scheduler local
    command: standalone
    networks:
      - logistics_net
  
  # ----------------------------------------------------------------------------
  # 6. OBSERVABILITÉ (Grafana & Loki)
  # ----------------------------------------------------------------------------
  loki:
    image: grafana/loki:latest
    container_name: 10_loki
    mem_limit: 256m
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - logistics_net

  grafana:
    image: grafana/grafana:latest
    container_name: 11_grafana
    mem_limit: 256m
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    networks:
      - logistics_net

# ==============================================================================
# CONFIGURATIONS COMMUNES
# ==============================================================================
networks:
  logistics_net:
    driver: bridge

volumes:
  pgdata_logistics:
  minio_data:
